<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工作台 — AI 项目教练</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .page-header-text h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .page-header-text p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .empty-state h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .empty-state p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 28px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }

    /* 项目列表 */
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 60px;
    }

    .project-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 24px;
      transition: border-color 0.2s;
    }
    .project-card:hover {
      border-color: rgba(0, 229, 255, 0.2);
    }

    .project-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .project-title {
      font-size: 17px;
      font-weight: 700;
    }

    .stage-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .stage-idea {
      background: rgba(152, 152, 168, 0.12);
      color: var(--text-secondary);
      border: 1px solid rgba(152, 152, 168, 0.25);
    }
    .stage-clarify {
      background: rgba(0, 229, 255, 0.1);
      color: var(--accent);
      border: 1px solid rgba(0, 229, 255, 0.25);
    }
    .stage-design {
      background: rgba(124, 77, 255, 0.1);
      color: var(--accent-purple);
      border: 1px solid rgba(124, 77, 255, 0.25);
    }
    .stage-tasks {
      background: rgba(0, 230, 118, 0.1);
      color: var(--success);
      border: 1px solid rgba(0, 230, 118, 0.25);
    }

    .project-idea-preview {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .project-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .project-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .project-actions .btn-primary,
    .project-actions .btn-secondary {
      font-size: 13px;
      padding: 8px 18px;
      width: auto;
    }
    .btn-danger {
      display: inline-block;
      background: transparent;
      color: var(--danger);
      font-weight: 600;
      padding: 8px 18px;
      border-radius: var(--radius-btn);
      border: 1.5px solid rgba(255, 82, 82, 0.4);
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font-main);
      transition: background-color 0.2s, transform 0.2s;
    }
    .btn-danger:hover {
      background: rgba(255, 82, 82, 0.08);
      transform: translateY(-2px);
    }

    /* 数据管理区 */
    .data-section {
      border-top: 1px solid var(--border);
      padding-top: 40px;
      margin-top: 20px;
    }
    .data-section h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .data-section p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }
    .data-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .data-actions .btn-secondary {
      font-size: 13px;
      padding: 9px 20px;
      width: auto;
    }

    /* 删除确认弹窗 */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .confirm-modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 28px 28px 24px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }
    .confirm-modal h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .confirm-modal p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .confirm-modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .confirm-modal-actions .btn-secondary {
      font-size: 14px;
      padding: 9px 20px;
      width: auto;
    }
    .btn-confirm-delete {
      display: inline-block;
      background: var(--danger);
      color: #fff;
      font-weight: 600;
      padding: 9px 20px;
      border-radius: var(--radius-btn);
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-family: var(--font-main);
      transition: opacity 0.2s;
    }
    .btn-confirm-delete:hover {
      opacity: 0.85;
    }

    @media (max-width: 768px) {
      .page-header {
        flex-direction: column;
      }
      .project-actions .btn-primary,
      .project-actions .btn-secondary,
      .project-actions .btn-danger {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div id="nav-mount"></div>

  <div class="page-body">
    <div class="container" style="padding-top: 48px; padding-bottom: 80px;">

      <!-- 返回导航 -->
      <div class="page-nav">
        <a href="index.html" class="nav-link">← 返回首页</a>
        <a href="javascript:history.back()" class="nav-link">← 返回上一页</a>
      </div>

      <!-- 页面标题 -->
      <div class="page-header">
        <div class="page-header-text">
          <h1>我的工作台</h1>
          <p>管理你的所有项目，随时回到任何阶段继续推进。</p>
        </div>
        <a href="idea.html" class="btn-primary" style="white-space: nowrap; width: auto;">创建新项目</a>
      </div>

      <!-- 项目列表 -->
      <div id="project-list-container"></div>

      <!-- 数据管理 -->
      <div class="data-section">
        <h2>数据管理</h2>
        <p>所有数据存储在你的浏览器中。建议定期备份。</p>
        <div class="data-actions">
          <button class="btn-secondary" onclick="handleExport()">导出所有项目</button>
          <button class="btn-secondary" onclick="document.getElementById('import-input').click()">导入项目数据</button>
          <input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(this)" />
        </div>
      </div>

    </div>
  </div>

  <div id="footer-mount"></div>

  <!-- 删除确认弹窗 -->
  <div class="confirm-overlay" id="confirm-overlay" style="display:none">
    <div class="confirm-modal">
      <h3>确认删除</h3>
      <p id="confirm-msg"></p>
      <div class="confirm-modal-actions">
        <button class="btn-secondary" onclick="closeConfirm()">取消</button>
        <button class="btn-confirm-delete" onclick="confirmDelete()">确定删除</button>
      </div>
    </div>
  </div>

  <script src="js/project.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/legal.js"></script>
  <script>
    var pendingDeleteId = null;

    var STAGE_LABELS = {
      idea:    { text: '已输入想法',   cls: 'stage-idea' },
      clarify: { text: '已澄清需求',   cls: 'stage-clarify' },
      design:  { text: '已生成设计书', cls: 'stage-design' },
      tasks:   { text: '已拆解任务',   cls: 'stage-tasks' }
    };

    function getNextUrl(project) {
      var map = {
        idea:    'clarify.html?id=' + project.id,
        clarify: 'design.html?id=' + project.id,
        design:  'tasks.html?id=' + project.id,
        tasks:   'tasks.html?id=' + project.id
      };
      return map[project.stage] || ('clarify.html?id=' + project.id);
    }

    function formatDate(iso) {
      var d = new Date(iso);
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0') + ' ' +
        String(d.getHours()).padStart(2, '0') + ':' +
        String(d.getMinutes()).padStart(2, '0');
    }

    function truncate(text, max) {
      return text.length > max ? text.slice(0, max) + '...' : text;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
    function escapeAttr(str) {
      return String(str).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    }

    function renderProjects() {
      var container = document.getElementById('project-list-container');
      var projects = getAllProjects();

      if (projects.length === 0) {
        container.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-icon">📂</div>' +
            '<h2>还没有项目</h2>' +
            '<p>有了想法就可以开始，点击下方按钮创建你的第一个项目</p>' +
            '<a href="idea.html" class="btn-primary" style="width:auto; display:inline-block;">开始做第一个项目</a>' +
          '</div>';
        return;
      }

      var html = '<div class="project-list">';
      projects.forEach(function (p) {
        var stageInfo = STAGE_LABELS[p.stage] || STAGE_LABELS.idea;
        html +=
          '<div class="project-card">' +
            '<div class="project-card-top">' +
              '<div class="project-title">' + escapeHtml(p.title) + '</div>' +
              '<span class="stage-badge ' + stageInfo.cls + '">' + stageInfo.text + '</span>' +
            '</div>' +
            '<div class="project-idea-preview">' + escapeHtml(truncate(p.idea, 80)) + '</div>' +
            '<div class="project-meta">' +
              '<span>创建于 ' + formatDate(p.created_at) + '</span>' +
              '<span>更新于 ' + formatDate(p.updated_at) + '</span>' +
            '</div>' +
            '<div class="project-actions">' +
              '<a href="' + getNextUrl(p) + '" class="btn-primary">继续推进</a>' +
              '<a href="idea.html?id=' + p.id + '" class="btn-secondary">编辑想法</a>' +
              '<button class="btn-danger" onclick="askDelete(\'' + p.id + '\', \'' + escapeAttr(p.title) + '\')">删除</button>' +
            '</div>' +
          '</div>';
      });
      html += '</div>';
      container.innerHTML = html;
    }

    function askDelete(id, title) {
      pendingDeleteId = id;
      document.getElementById('confirm-msg').textContent =
        '确定要删除项目「' + title + '」吗？此操作不可恢复。';
      document.getElementById('confirm-overlay').style.display = 'flex';
    }

    function closeConfirm() {
      pendingDeleteId = null;
      document.getElementById('confirm-overlay').style.display = 'none';
    }

    function confirmDelete() {
      if (pendingDeleteId) {
        deleteProject(pendingDeleteId);
        pendingDeleteId = null;
      }
      document.getElementById('confirm-overlay').style.display = 'none';
      renderProjects();
    }

    function handleExport() {
      var json = exportProjects();
      var today = new Date();
      var dateStr = today.getFullYear() + '-' +
        String(today.getMonth() + 1).padStart(2, '0') + '-' +
        String(today.getDate()).padStart(2, '0');
      var blob = new Blob([json], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'ai-coach-projects-' + dateStr + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function handleImport(input) {
      var file = input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (e) {
        try {
          var added = importProjects(e.target.result);
          alert('导入成功，新增 ' + added + ' 个项目。');
          renderProjects();
        } catch (err) {
          alert('导入失败，请检查文件格式');
        }
        input.value = '';
      };
      reader.readAsText(file);
    }

    renderProjects();
  </script>
</body>
</html>
